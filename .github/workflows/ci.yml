name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy python-dotenv pytest pytest-cov black pylint

      - name: Check formatting with black
        run: black --check src config tests

      - name: Lint with pylint (errors only, blocking)
        run: pylint src config --disable=all --enable=E

      - name: Lint with pylint (full report, informational)
        run: pylint src config --disable=missing-module-docstring,missing-class-docstring,missing-function-docstring || true

      - name: Run tests with pytest
        run: pytest tests/ -v --cov=src --cov-report=term-missing
